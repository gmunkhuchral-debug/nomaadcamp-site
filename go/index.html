<!-- ═══════════════════════════════════════════════════════════════════
     /go REDIRECT  —  QR код хаашаа шилжих вэ?

     Энэ файл нь nomaadcamp.com/go линкийг ямар нэг хаягруу
     автоматаар шилжүүлдэг. Аяган дээрх QR код энэ хаягийг
     уншуулдаг.

     ┌─────────────────────────────────────────────────────────────┐
     │  ЗОРИЛТЫГ ӨӨРЧЛӨХ:                                          │
     │                                                             │
     │  Доорх <script> доторх ZORILT мөрийг солиод                 │
     │  GitHub Desktop-аас push хийнэ үү. 2 минутын дараа          │
     │  nomaadcamp.com/go нь шинэ хаяг руу шилжинэ.                │
     └─────────────────────────────────────────────────────────────┘

     Жишээ зорилт:
       "/"                          → Нүүр хуудас (default)
       "/#camps"                    → Кемпүүд хэсэгт скролл
       "/#contact"                  → Холбоо барих руу
       "/#next-stage"               → 2026 шинэчлэлийн хэсэг
       "https://wa.me/97699179417"  → WhatsApp шууд харилцаа
       "https://m.me/nomaadcamp"    → Facebook Messenger
       "https://forms.gle/abc123"   → Google Forms асуулт
       "https://calendar.google.com/..." → Календарь захиалга
     ═══════════════════════════════════════════════════════════════════ -->

<script>
  // 🎯 Дараах мөрийг л солих хэрэгтэй ↓
  var ZORILT = "/";

  // (доорх кодыг бүү хөдөлгө)
  try { window.location.replace(ZORILT); }
  catch (e) { window.location.href = ZORILT; }
</script>
